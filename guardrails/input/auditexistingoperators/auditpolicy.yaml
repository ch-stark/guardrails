# 4. Audit Existing Operators Policy - INFORM
apiVersion: policy.open-cluster-management.io/v1
kind: ConfigurationPolicy
metadata:
  name: audit-existing-operators
spec:
  remediationAction: inform
  severity: high
  object-templates-raw: |
    {{hub- /* 1. Fetch the lists from the Hub */ -}}
    {{hub- $allowlist := fromConfigMap "policies" "operator-allowlist" "packages" | default "" hub}}
    {{hub- $denylist := fromConfigMap "policies" "operator-denylist" "packages" | default "" hub}}
    
    {{- /* 2. Always yield a dummy resource so the template is never empty if no violations exist */ -}}
    - complianceType: musthave
      objectDefinition:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: operator-guardrails-audit-active
          namespace: policies
    
    {{- /* 3. Lookup all existing Operator Subscriptions on the local managed cluster */ -}}
    {{- $subscriptions := (lookup "operators.coreos.com/v1alpha1" "Subscription" "" "").items }}
    
    {{- /* 4. Convert the Hub strings into local arrays */ -}}
    {{- $allowedPackages := splitList "," "{{hub $allowlist hub}}" }}
    {{- $deniedPackages := splitList "," "{{hub $denylist hub}}" }}
    
    {{- /* 5. Loop through every subscription and evaluate the Default-Deny logic */ -}}
    {{- range $sub := $subscriptions }}
      {{- $operatorName := $sub.spec.name }}
      {{- $isAllowed := false }}
      
      {{- range $pkg := $allowedPackages }}
        {{- if eq (trim $pkg) $operatorName }}
          {{- $isAllowed = true }}
        {{- end }}
      {{- end }}
      
      {{- range $pkg := $deniedPackages }}
        {{- if eq (trim $pkg) $operatorName }}
          {{- $isAllowed = false }}
        {{- end }}
      {{- end }}
      
      {{- /* 6. If the operator is not allowed, generate a mustnothave rule for it */ -}}
      {{- if not $isAllowed }}
    - complianceType: mustnothave
      objectDefinition:
        apiVersion: operators.coreos.com/v1alpha1
        kind: Subscription
        metadata:
          # This specific name and namespace will be flagged in the ACM UI
          name: {{ $sub.metadata.name }}
          namespace: {{ $sub.metadata.namespace }}
      {{- end }}
    {{- end }}
