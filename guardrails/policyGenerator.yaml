apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: operator-guardrails
# Add an explicit placement binding name to use rather than rely on the default
placementBindingDefaults:
  name: "operator-guardrails-binding" 
policyDefaults:
  namespace: policies
  categories:
    - CM Configuration Management
  controls:
    - CM-2 Baseline Configuration
  remediationAction: enforce
  severity: medium
  policySets:
    - operator-guardrails
  standards:
    - NIST SP 800-53
policies:
  - name: enforce-operator-guardrails
    manifests:
      - path: input/auditexistingoperators
policySets:
  - description: operator-guardrails
    name: operator-guardrails
    placement:
      placementPath: placement.yaml
